swagger: "2.0"
info:
  title: KABAR SEO Backend API
  description: API for SEO Content Management System
  version: 1.0.0
  termsOfService: http://swagger.io/terms/
  contact:
    name: API Support
    email: support@seo-backend.com
    url: http://www.swagger.io/support
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
host: localhost:8080
basePath: /api
schemes:
  - http
  - https
consumes:
  - application/json
produces:
  - application/json
securityDefinitions:
  BearerAuth:
    type: apiKey
    in: header
    name: Authorization
    description: 'Type "Bearer" followed by a space and JWT token'
tags:
  - name: auth
    description: Authentication endpoints
  - name: users
    description: User management
  - name: teams
    description: Team management
  - name: products
    description: Product management
  - name: drafts
    description: Draft management
  - name: history
    description: History management
  - name: generate
    description: AI generation endpoints
  - name: health
    description: Health check endpoints

definitions:
  ErrorResponse:
    type: object
    properties:
      error:
        type: string
        example: "invalid_request"
      message:
        type: string
        example: "Invalid request parameters"
      code:
        type: integer
        example: 400

  SuccessResponse:
    type: object
    properties:
      message:
        type: string
        example: "success"
      data:
        type: object

  User:
    type: object
    properties:
      id:
        type: string
        format: uuid
      email:
        type: string
        format: email
      name:
        type: string
      role:
        type: string
        enum: [admin, manager, editor, viewer]
      avatar:
        type: string
      status:
        type: string
        enum: [active, inactive]
      lastActive:
        type: string
        format: date-time
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time

  LoginRequest:
    type: object
    required:
      - email
      - password
    properties:
      email:
        type: string
      password:
        type: string

  LoginResponse:
    type: object
    properties:
      token:
        type: string
      user:
        $ref: "#/definitions/User"

  RegisterRequest:
    type: object
    required:
      - email
      - name
      - password
    properties:
      email:
        type: string
        format: email
      name:
        type: string
      password:
        type: string
        format: password

  ChangePasswordRequest:
    type: object
    required:
      - oldPassword
      - newPassword
    properties:
      oldPassword:
        type: string
      newPassword:
        type: string

  ForgotPasswordRequest:
    type: object
    required:
      - email
    properties:
      email:
        type: string

  Team:
    type: object
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
      description:
        type: string
      logo:
        type: string
      status:
        type: string
        enum: [active, inactive, archived]
      maxMembers:
        type: integer
      createdBy:
        type: string
        format: uuid
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
      members:
        type: array
        items:
          $ref: "#/definitions/TeamMember"

  TeamMember:
    type: object
    properties:
      id:
        type: string
        format: uuid
      teamId:
        type: string
        format: uuid
      userId:
        type: string
        format: uuid
      userEmail:
        type: string
      userName:
        type: string
      role:
        type: string
        enum: [manager, editor, viewer]
      status:
        type: string
        enum: [active, inactive, pending, left]
      joinedAt:
        type: string
        format: date-time
      leftAt:
        type: string
        format: date-time

  CreateTeamRequest:
    type: object
    required:
      - name
    properties:
      name:
        type: string
      description:
        type: string
      logo:
        type: string

  UpdateTeamRequest:
    type: object
    properties:
      name:
        type: string
      description:
        type: string
      logo:
        type: string
      status:
        type: string
        enum: [active, inactive, archived]
      maxMembers:
        type: integer

  AddTeamMemberRequest:
    type: object
    required:
      - userId
      - role
    properties:
      userId:
        type: string
        format: uuid
      role:
        type: string
        enum: [manager, editor, viewer]

  Product:
    type: object
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
      platform:
        type: string
        enum: [wordpress, shopify, custom]
      apiEndpoint:
        type: string
      status:
        type: string
        enum: [connected, pending, error, disconnected]
      syncStatus:
        type: string
        enum: [idle, syncing, success, failed]
      lastSync:
        type: string
        format: date-time
      createdBy:
        type: string
        format: uuid
      teamId:
        type: string
        format: uuid
      userId:
        type: string
        format: uuid
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
      adapterConfig:
        $ref: "#/definitions/AdapterConfig"

  AdapterConfig:
    type: object
    properties:
      id:
        type: string
        format: uuid
      productId:
        type: string
        format: uuid
      endpointPath:
        type: string
      httpMethod:
        type: string
        enum: [POST, PUT, PATCH, GET]
      customHeaders:
        type: object
        additionalProperties:
          type: string
      fieldMapping:
        type: string
      timeoutSeconds:
        type: integer
      retryCount:
        type: integer
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time

  CreateProductRequest:
    type: object
    required:
      - name
      - platform
      - apiEndpoint
    properties:
      name:
        type: string
      platform:
        type: string
        enum: [wordpress, shopify, custom]
      apiEndpoint:
        type: string
      apiKey:
        type: string
      teamId:
        type: string
        format: uuid
      adapterConfig:
        $ref: "#/definitions/CreateAdapterConfigRequest"

  CreateAdapterConfigRequest:
    type: object
    properties:
      endpointPath:
        type: string
      httpMethod:
        type: string
        enum: [POST, PUT, PATCH, GET]
      customHeaders:
        type: object
      fieldMapping:
        type: string
      timeoutSeconds:
        type: integer
      retryCount:
        type: integer

  UpdateProductRequest:
    type: object
    properties:
      name:
        type: string
      platform:
        type: string
        enum: [wordpress, shopify, custom]
      apiEndpoint:
        type: string
      apiKey:
        type: string
      status:
        type: string
        enum: [connected, pending, error, disconnected]
      syncStatus:
        type: string
        enum: [idle, syncing, success, failed]
      adapterConfig:
        $ref: "#/definitions/UpdateAdapterConfigRequest"

  UpdateAdapterConfigRequest:
    type: object
    properties:
      endpointPath:
        type: string
      httpMethod:
        type: string
        enum: [POST, PUT, PATCH, GET]
      customHeaders:
        type: object
      fieldMapping:
        type: string
      timeoutSeconds:
        type: integer
      retryCount:
        type: integer

  Draft:
    type: object
    properties:
      id:
        type: string
        format: uuid
      title:
        type: string
      topic:
        type: string
      article:
        type: string
      excerpt:
        type: string
      imageUrl:
        type: string
      imagePrompt:
        type: string
      imageGenerationStatus:
        type: string
        enum: [pending, generating, completed, failed]
      status:
        type: string
        enum: [draft, review, approved, scheduled, published, archived]
      scheduledFor:
        type: string
        format: date-time
      targetProducts:
        type: array
        items:
          type: string
      tags:
        type: array
        items:
          type: string
      seoScore:
        type: integer
      readabilityScore:
        type: integer
      wordCount:
        type: integer
      hasImage:
        type: boolean
      version:
        type: integer
      createdBy:
        type: string
        format: uuid
      teamId:
        type: string
        format: uuid
      userId:
        type: string
        format: uuid
      reviewedBy:
        type: string
        format: uuid
      reviewedAt:
        type: string
        format: date-time
      reviewNotes:
        type: string
      publishedAt:
        type: string
        format: date-time
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time

  CreateDraftRequest:
    type: object
    required:
      - title
      - topic
      - article
    properties:
      title:
        type: string
      topic:
        type: string
      article:
        type: string
      excerpt:
        type: string
      imageUrl:
        type: string
      imagePrompt:
        type: string
      targetProducts:
        type: array
        items:
          type: string
      tags:
        type: array
        items:
          type: string
      hasImage:
        type: boolean
      teamId:
        type: string
        format: uuid

  UpdateDraftRequest:
    type: object
    properties:
      title:
        type: string
      topic:
        type: string
      article:
        type: string
      excerpt:
        type: string
      imageUrl:
        type: string
      imagePrompt:
        type: string
      status:
        type: string
        enum: [draft, review, approved, scheduled, published, archived]
      scheduledFor:
        type: string
        format: date-time
      targetProducts:
        type: array
        items:
          type: string
      tags:
        type: array
        items:
          type: string
      seoScore:
        type: integer
      readabilityScore:
        type: integer
      wordCount:
        type: integer
      hasImage:
        type: boolean
      reviewNotes:
        type: string

  PublishDraftRequest:
    type: object
    properties:
      scheduledFor:
        type: string
        format: date-time
      approve:
        type: boolean

  RejectDraftRequest:
    type: object
    properties:
      notes:
        type: string

  History:
    type: object
    properties:
      id:
        type: string
        format: uuid
      title:
        type: string
      topic:
        type: string
      content:
        type: string
      excerpt:
        type: string
      imageUrl:
        type: string
      targetProducts:
        type: array
        items:
          type: string
      status:
        type: string
        enum: [success, failed, pending, partial]
      action:
        type: string
        enum: [published, scheduled, draft_saved, updated, deleted, restored]
      errorMessage:
        type: string
      errorDetails:
        type: object
      responseData:
        type: object
      publishedAt:
        type: string
        format: date-time
      scheduledFor:
        type: string
        format: date-time
      executionTimeMs:
        type: integer
      ipAddress:
        type: string
      userAgent:
        type: string
      createdBy:
        type: string
        format: uuid
      teamId:
        type: string
        format: uuid
      userId:
        type: string
        format: uuid
      createdAt:
        type: string
        format: date-time

  AddHistoryRequest:
    type: object
    required:
      - title
      - topic
      - content
      - status
      - action
    properties:
      title:
        type: string
      topic:
        type: string
      content:
        type: string
      excerpt:
        type: string
      imageUrl:
        type: string
      targetProducts:
        type: array
        items:
          type: string
      status:
        type: string
        enum: [success, failed, pending]
      action:
        type: string
        enum: [published, scheduled, draft_saved]
      errorMessage:
        type: string
      errorDetails:
        type: object
      responseData:
        type: object
      scheduledFor:
        type: string
        format: date-time
      executionTimeMs:
        type: integer

  GenerateArticleRequest:
    type: object
    required:
      - topic
    properties:
      topic:
        type: string
      tone:
        type: string
        enum: [professional, casual, friendly, formal]
        default: professional
      length:
        type: string
        enum: [short, medium, long]
        default: medium
      keywords:
        type: array
        items:
          type: string
      language:
        type: string
        enum: [id, en]
        default: id

  GenerateArticleResponse:
    type: object
    properties:
      title:
        type: string
      content:
        type: string
      excerpt:
        type: string
      keywords:
        type: array
        items:
          type: string
      imagePrompt:
        type: string
      imageUrl:
        type: string
      wordCount:
        type: integer
      readabilityScore:
        type: integer
      seoScore:
        type: integer

  GenerateImageRequest:
    type: object
    required:
      - prompt
    properties:
      prompt:
        type: string

  GenerateImageResponse:
    type: object
    properties:
      imageUrl:
        type: string
      prompt:
        type: string
      generatedAt:
        type: string
      model:
        type: string

paths:
  /health:
    get:
      tags:
        - health
      summary: Health check
      operationId: healthCheck
      responses:
        200:
          description: Server is healthy
          schema:
            type: object
            properties:
              status:
                type: string
              timestamp:
                type: string

  /metrics:
    get:
      tags:
        - health
      summary: System metrics
      operationId: getMetrics
      responses:
        200:
          description: System metrics
          schema:
            type: object

  /api:
    get:
      tags:
        - health
      summary: API information
      operationId: apiInfo
      responses:
        200:
          description: API information
          schema:
            type: object

  # ========== AUTH ==========
  /auth/login:
    post:
      tags:
        - auth
      summary: User login
      operationId: login
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/LoginRequest"
      responses:
        200:
          description: Login successful
          schema:
            $ref: "#/definitions/LoginResponse"
        401:
          description: Invalid credentials
          schema:
            $ref: "#/definitions/ErrorResponse"

  /auth/register:
    post:
      tags:
        - auth
      summary: User registration
      operationId: register
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/RegisterRequest"
      responses:
        201:
          description: User registered successfully
          schema:
            $ref: "#/definitions/User"
        400:
          description: Invalid request
          schema:
            $ref: "#/definitions/ErrorResponse"
        409:
          description: User already exists
          schema:
            $ref: "#/definitions/ErrorResponse"

  /auth/me:
    get:
      tags:
        - auth
      summary: Get current user
      operationId: getMe
      security:
        - BearerAuth: []
      responses:
        200:
          description: Current user info
          schema:
            $ref: "#/definitions/User"
        401:
          description: Unauthorized

  /auth/change-password:
    post:
      tags:
        - auth
      summary: Change password
      operationId: changePassword
      security:
        - BearerAuth: []
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/ChangePasswordRequest"
      responses:
        200:
          description: Password changed
          schema:
            $ref: "#/definitions/SuccessResponse"
        401:
          description: Invalid old password

  /auth/forgot-password:
    post:
      tags:
        - auth
      summary: Forgot password
      operationId: forgotPassword
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/ForgotPasswordRequest"
      responses:
        200:
          description: Reset email sent
          schema:
            $ref: "#/definitions/SuccessResponse"

  # ========== USERS ==========
  /users:
    get:
      tags:
        - users
      summary: Get all users
      operationId: getUsers
      security:
        - BearerAuth: []
      responses:
        200:
          description: List of users
          schema:
            type: array
            items:
              $ref: "#/definitions/User"
        401:
          description: Unauthorized

    post:
      tags:
        - users
      summary: Create user
      operationId: createUser
      security:
        - BearerAuth: []
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/RegisterRequest"
      responses:
        201:
          description: User created
          schema:
            $ref: "#/definitions/User"

  /users/{id}:
    get:
      tags:
        - users
      summary: Get user by ID
      operationId: getUserById
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          type: string
          format: uuid
      responses:
        200:
          description: User details
          schema:
            $ref: "#/definitions/User"
        404:
          description: User not found

    put:
      tags:
        - users
      summary: Update user
      operationId: updateUser
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          type: string
          format: uuid
        - in: body
          name: body
          required: true
          schema:
            type: object
      responses:
        200:
          description: User updated
          schema:
            $ref: "#/definitions/SuccessResponse"

    delete:
      tags:
        - users
      summary: Delete user
      operationId: deleteUser
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          type: string
          format: uuid
      responses:
        204:
          description: User deleted

  # ========== TEAMS ==========
  /teams:
    get:
      tags:
        - teams
      summary: Get all teams
      operationId: getTeams
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: status
          type: string
          enum: [active, inactive, archived]
      responses:
        200:
          description: List of teams
          schema:
            type: array
            items:
              $ref: "#/definitions/Team"
        401:
          description: Unauthorized

    post:
      tags:
        - teams
      summary: Create team
      operationId: createTeam
      security:
        - BearerAuth: []
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreateTeamRequest"
      responses:
        201:
          description: Team created
          schema:
            $ref: "#/definitions/Team"

  /teams/{id}:
    get:
      tags:
        - teams
      summary: Get team by ID
      operationId: getTeamById
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          type: string
          format: uuid
      responses:
        200:
          description: Team details
          schema:
            $ref: "#/definitions/Team"
        404:
          description: Team not found

    put:
      tags:
        - teams
      summary: Update team
      operationId: updateTeam
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          type: string
          format: uuid
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/UpdateTeamRequest"
      responses:
        200:
          description: Team updated
          schema:
            $ref: "#/definitions/SuccessResponse"

    delete:
      tags:
        - teams
      summary: Delete team
      operationId: deleteTeam
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          type: string
          format: uuid
      responses:
        204:
          description: Team deleted

  /teams/{id}/members:
    get:
      tags:
        - teams
      summary: Get team members
      operationId: getTeamMembers
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          type: string
          format: uuid
      responses:
        200:
          description: List of team members
          schema:
            type: array
            items:
              $ref: "#/definitions/TeamMember"

    post:
      tags:
        - teams
      summary: Add team member
      operationId: addTeamMember
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          type: string
          format: uuid
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/AddTeamMemberRequest"
      responses:
        201:
          description: Member added
          schema:
            $ref: "#/definitions/Team"

  /teams/{id}/members/{userId}:
    put:
      tags:
        - teams
      summary: Update team member role
      operationId: updateTeamMemberRole
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          type: string
          format: uuid
        - in: path
          name: userId
          required: true
          type: string
          format: uuid
        - in: body
          name: body
          required: true
          schema:
            type: object
            properties:
              role:
                type: string
                enum: [manager, editor, viewer]
      responses:
        200:
          description: Member role updated
          schema:
            $ref: "#/definitions/Team"

    delete:
      tags:
        - teams
      summary: Remove team member
      operationId: removeTeamMember
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          type: string
          format: uuid
        - in: path
          name: userId
          required: true
          type: string
          format: uuid
      responses:
        200:
          description: Member removed
          schema:
            $ref: "#/definitions/Team"

  /users/{userId}/teams:
    get:
      tags:
        - teams
      summary: Get user's teams
      operationId: getUserTeams
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          type: string
          format: uuid
      responses:
        200:
          description: List of user's teams
          schema:
            type: array
            items:
              $ref: "#/definitions/Team"

  # ========== PRODUCTS ==========
  /products:
    get:
      tags:
        - products
      summary: Get all products
      operationId: getProducts
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: platform
          type: string
          enum: [wordpress, shopify, custom]
        - in: query
          name: status
          type: string
          enum: [connected, pending, error, disconnected]
        - in: query
          name: syncStatus
          type: string
          enum: [idle, syncing, success, failed]
      responses:
        200:
          description: List of products
          schema:
            type: array
            items:
              $ref: "#/definitions/Product"

    post:
      tags:
        - products
      summary: Create product
      operationId: createProduct
      security:
        - BearerAuth: []
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreateProductRequest"
      responses:
        201:
          description: Product created
          schema:
            $ref: "#/definitions/SuccessResponse"

  /products/{id}:
    get:
      tags:
        - products
      summary: Get product by ID
      operationId: getProductById
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          type: string
          format: uuid
      responses:
        200:
          description: Product details
          schema:
            $ref: "#/definitions/Product"

    put:
      tags:
        - products
      summary: Update product
      operationId: updateProduct
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          type: string
          format: uuid
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/UpdateProductRequest"
      responses:
        200:
          description: Product updated
