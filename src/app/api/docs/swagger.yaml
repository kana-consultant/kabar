swagger: "2.0"
info:
  title: SEO Backend API
  description: API for SEO Content Management System
  version: 1.0.0
  termsOfService: http://swagger.io/terms/
  contact:
    name: API Support
    email: support@seo-backend.com
    url: http://www.swagger.io/support
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
host: localhost:8080
basePath: /api
schemes:
  - http
  - https
consumes:
  - application/json
produces:
  - application/json
securityDefinitions:
  BearerAuth:
    type: apiKey
    in: header
    name: Authorization
    description: 'Type "Bearer" followed by a space and JWT token'
tags:
  - name: auth
    description: Authentication endpoints
  - name: users
    description: User management
  - name: teams
    description: Team management
  - name: products
    description: Product management
  - name: drafts
    description: Draft management
  - name: history
    description: History management
  - name: generate
    description: AI generation endpoints
  - name: api-keys
    description: API Key management
  - name: models
    description: AI Model management
  - name: providers
    description: Provider management
  - name: dashboard
    description: Dashboard endpoints
  - name: health
    description: Health check endpoints

definitions:
  ErrorResponse:
    type: object
    properties:
      error:
        type: string
        example: "invalid_request"
      message:
        type: string
        example: "Invalid request parameters"
      code:
        type: integer
        example: 400

  SuccessResponse:
    type: object
    properties:
      message:
        type: string
        example: "success"
      data:
        type: object

  User:
    type: object
    properties:
      id:
        type: string
        format: uuid
      email:
        type: string
        format: email
      name:
        type: string
      role:
        type: string
        enum: [admin, manager, editor, viewer]
      avatar:
        type: string
      status:
        type: string
        enum: [active, inactive]
      lastActive:
        type: string
        format: date-time
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time

  LoginRequest:
    type: object
    required:
      - email
      - password
    properties:
      email:
        type: string
        example: "user@example.com"
      password:
        type: string
        example: "password123"

  LoginResponse:
    type: object
    properties:
      token:
        type: string
        example: "eyJhbGciOiJIUzI1NiIs..."
      user:
        $ref: "#/definitions/User"

  RegisterRequest:
    type: object
    required:
      - email
      - name
      - password
    properties:
      email:
        type: string
        format: email
        example: "user@example.com"
      name:
        type: string
        example: "John Doe"
      password:
        type: string
        format: password
        example: "password123"

  ChangePasswordRequest:
    type: object
    required:
      - oldPassword
      - newPassword
    properties:
      oldPassword:
        type: string
        example: "oldpass123"
      newPassword:
        type: string
        example: "newpass123"

  ForgotPasswordRequest:
    type: object
    required:
      - email
    properties:
      email:
        type: string
        format: email
        example: "user@example.com"

  Team:
    type: object
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
      description:
        type: string
      logo:
        type: string
      status:
        type: string
        enum: [active, inactive, archived]
      maxMembers:
        type: integer
      createdBy:
        type: string
        format: uuid
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
      members:
        type: array
        items:
          $ref: "#/definitions/TeamMember"

  TeamMember:
    type: object
    properties:
      id:
        type: string
        format: uuid
      teamId:
        type: string
        format: uuid
      userId:
        type: string
        format: uuid
      userEmail:
        type: string
      userName:
        type: string
      role:
        type: string
        enum: [manager, editor, viewer]
      status:
        type: string
        enum: [active, inactive, pending, left]
      joinedAt:
        type: string
        format: date-time
      leftAt:
        type: string
        format: date-time

  CreateTeamRequest:
    type: object
    required:
      - name
    properties:
      name:
        type: string
        example: "Marketing Team"
      description:
        type: string
        example: "Team for content marketing"
      logo:
        type: string
        example: "https://example.com/logo.png"

  UpdateTeamRequest:
    type: object
    properties:
      name:
        type: string
      description:
        type: string
      logo:
        type: string
      status:
        type: string
        enum: [active, inactive, archived]
      maxMembers:
        type: integer

  AddTeamMemberRequest:
    type: object
    required:
      - userId
      - role
    properties:
      userId:
        type: string
        format: uuid
      role:
        type: string
        enum: [manager, editor, viewer]

  UpdateMemberRoleRequest:
    type: object
    required:
      - role
    properties:
      role:
        type: string
        enum: [manager, editor, viewer]

  Product:
    type: object
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
      platform:
        type: string
        enum: [wordpress, shopify, custom]
      apiEndpoint:
        type: string
      status:
        type: string
        enum: [connected, pending, error, disconnected]
      syncStatus:
        type: string
        enum: [idle, syncing, success, failed]
      lastSync:
        type: string
        format: date-time
      createdBy:
        type: string
        format: uuid
      teamId:
        type: string
        format: uuid
      userId:
        type: string
        format: uuid
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
      adapterConfig:
        $ref: "#/definitions/AdapterConfig"

  AdapterConfig:
    type: object
    properties:
      id:
        type: string
        format: uuid
      productId:
        type: string
        format: uuid
      endpointPath:
        type: string
      httpMethod:
        type: string
        enum: [POST, PUT, PATCH, GET]
      customHeaders:
        type: object
        additionalProperties:
          type: string
      fieldMapping:
        type: string
      timeoutSeconds:
        type: integer
      retryCount:
        type: integer
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time

  CreateProductRequest:
    type: object
    required:
      - name
      - platform
      - apiEndpoint
    properties:
      name:
        type: string
        example: "My WordPress Site"
      platform:
        type: string
        enum: [wordpress, shopify, custom]
        example: "wordpress"
      apiEndpoint:
        type: string
        example: "https://mywp.com/wp-json"
      apiKey:
        type: string
        example: "wp_api_key_123"
      teamId:
        type: string
        format: uuid
      adapterConfig:
        $ref: "#/definitions/CreateAdapterConfigRequest"

  CreateAdapterConfigRequest:
    type: object
    properties:
      endpointPath:
        type: string
        example: "/wp-json/wp/v2/posts"
      httpMethod:
        type: string
        enum: [POST, PUT, PATCH, GET]
        example: "POST"
      customHeaders:
        type: object
      fieldMapping:
        type: string
      timeoutSeconds:
        type: integer
        example: 30
      retryCount:
        type: integer
        example: 3

  UpdateProductRequest:
    type: object
    properties:
      name:
        type: string
      platform:
        type: string
        enum: [wordpress, shopify, custom]
      apiEndpoint:
        type: string
      apiKey:
        type: string
      status:
        type: string
        enum: [connected, pending, error, disconnected]
      syncStatus:
        type: string
        enum: [idle, syncing, success, failed]
      adapterConfig:
        $ref: "#/definitions/UpdateAdapterConfigRequest"

  UpdateAdapterConfigRequest:
    type: object
    properties:
      endpointPath:
        type: string
      httpMethod:
        type: string
        enum: [POST, PUT, PATCH, GET]
      customHeaders:
        type: object
      fieldMapping:
        type: string
      timeoutSeconds:
        type: integer
      retryCount:
        type: integer

  Draft:
    type: object
    properties:
      id:
        type: string
        format: uuid
      title:
        type: string
      topic:
        type: string
      article:
        type: string
      excerpt:
        type: string
      imageUrl:
        type: string
      imagePrompt:
        type: string
      imageGenerationStatus:
        type: string
        enum: [pending, generating, completed, failed]
      status:
        type: string
        enum: [draft, review, approved, scheduled, published, archived]
      scheduledFor:
        type: string
        format: date-time
      targetProducts:
        type: array
        items:
          type: string
      tags:
        type: array
        items:
          type: string
      seoScore:
        type: integer
      readabilityScore:
        type: integer
      wordCount:
        type: integer
      hasImage:
        type: boolean
      version:
        type: integer
      createdBy:
        type: string
        format: uuid
      teamId:
        type: string
        format: uuid
      userId:
        type: string
        format: uuid
      reviewedBy:
        type: string
        format: uuid
      reviewedAt:
        type: string
        format: date-time
      reviewNotes:
        type: string
      publishedAt:
        type: string
        format: date-time
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time

  CreateDraftRequest:
    type: object
    required:
      - title
      - topic
      - article
    properties:
      title:
        type: string
        example: "10 SEO Tips"
      topic:
        type: string
        example: "SEO Best Practices"
      article:
        type: string
        example: "<p>Content here...</p>"
      excerpt:
        type: string
        example: "Summary of the article"
      imageUrl:
        type: string
      imagePrompt:
        type: string
      targetProducts:
        type: array
        items:
          type: string
      tags:
        type: array
        items:
          type: string
      hasImage:
        type: boolean
      teamId:
        type: string
        format: uuid

  UpdateDraftRequest:
    type: object
    properties:
      title:
        type: string
      topic:
        type: string
      article:
        type: string
      excerpt:
        type: string
      imageUrl:
        type: string
      imagePrompt:
        type: string
      status:
        type: string
        enum: [draft, review, approved, scheduled, published, archived]
      scheduledFor:
        type: string
        format: date-time
      targetProducts:
        type: array
        items:
          type: string
      tags:
        type: array
        items:
          type: string
      seoScore:
        type: integer
      readabilityScore:
        type: integer
      wordCount:
        type: integer
      hasImage:
        type: boolean
      reviewNotes:
        type: string

  PublishDraftRequest:
    type: object
    properties:
      scheduledFor:
        type: string
        format: date-time
      approve:
        type: boolean

  ScheduleDraftRequest:
    type: object
    required:
      - scheduledFor
    properties:
      scheduledFor:
        type: string
        format: date-time

  PublishContentRequest:
    type: object
    properties:
      draftIds:
        type: array
        items:
          type: string

  History:
    type: object
    properties:
      id:
        type: string
        format: uuid
      title:
        type: string
      topic:
        type: string
      content:
        type: string
      excerpt:
        type: string
      imageUrl:
        type: string
      targetProducts:
        type: array
        items:
          type: string
      status:
        type: string
        enum: [success, failed, pending, partial]
      action:
        type: string
        enum: [published, scheduled, draft_saved, updated, deleted, restored]
      errorMessage:
        type: string
      errorDetails:
        type: object
      responseData:
        type: object
      publishedAt:
        type: string
        format: date-time
      scheduledFor:
        type: string
        format: date-time
      executionTimeMs:
        type: integer
      ipAddress:
        type: string
      userAgent:
        type: string
      createdBy:
        type: string
        format: uuid
      teamId:
        type: string
        format: uuid
      userId:
        type: string
        format: uuid
      createdAt:
        type: string
        format: date-time

  AddHistoryRequest:
    type: object
    required:
      - title
      - topic
      - content
      - status
      - action
    properties:
      title:
        type: string
      topic:
        type: string
      content:
        type: string
      excerpt:
        type: string
      imageUrl:
        type: string
      targetProducts:
        type: array
        items:
          type: string
      status:
        type: string
        enum: [success, failed, pending]
      action:
        type: string
        enum: [published, scheduled, draft_saved]
      errorMessage:
        type: string
      errorDetails:
        type: object
      responseData:
        type: object
      scheduledFor:
        type: string
        format: date-time
      executionTimeMs:
        type: integer

  HistoryStats:
    type: object
    properties:
      total:
        type: integer
      success:
        type: integer
      failed:
        type: integer
      pending:
        type: integer
      byAction:
        type: object

  GenerateArticleRequest:
    type: object
    required:
      - topic
    properties:
      topic:
        type: string
        example: "Cara Meningkatkan SEO Website"
      tone:
        type: string
        enum: [professional, casual, friendly, formal]
        default: professional
        example: "professional"
      length:
        type: string
        enum: [short, medium, long]
        default: medium
        example: "medium"
      keywords:
        type: array
        items:
          type: string
        example: ["SEO", "website", "optimization"]
      language:
        type: string
        enum: [id, en]
        default: id
        example: "id"

  GenerateArticleResponse:
    type: object
    properties:
      title:
        type: string
        example: "10 Cara Meningkatkan SEO Website"
      content:
        type: string
        example: "<p>Content artikel SEO...</p>"
      excerpt:
        type: string
        example: "Pelajari 10 cara efektif..."
      keywords:
        type: array
        items:
          type: string
      imagePrompt:
        type: string
        example: "SEO website illustration"
      imageUrl:
        type: string
      wordCount:
        type: integer
        example: 1500
      readabilityScore:
        type: integer
        example: 85
      seoScore:
        type: integer
        example: 92

  GenerateImageRequest:
    type: object
    required:
      - prompt
    properties:
      prompt:
        type: string
        example: "A modern SEO dashboard with analytics"

  GenerateImageResponse:
    type: object
    properties:
      imageUrl:
        type: string
        example: "https://storage.example.com/image.jpg"
      prompt:
        type: string
      generatedAt:
        type: string
        format: date-time
      model:
        type: string
        example: "dall-e-3"

  APIKey:
    type: object
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
      key:
        type: string
      permissions:
        type: array
        items:
          type: string
      expiresAt:
        type: string
        format: date-time
      lastUsedAt:
        type: string
        format: date-time
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time

  CreateAPIKeyRequest:
    type: object
    required:
      - name
    properties:
      name:
        type: string
      permissions:
        type: array
        items:
          type: string
      expiresIn:
        type: integer
        description: "Expiration in days"

  AIModel:
    type: object
    properties:
      id:
        type: string
      name:
        type: string
      provider:
        type: string
      type:
        type: string
        enum: [text, image]
      status:
        type: string
        enum: [active, inactive, maintenance]
      capabilities:
        type: array
        items:
          type: string

  Provider:
    type: object
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
      type:
        type: string
        enum: [openai, anthropic, google, custom]
      apiEndpoint:
        type: string
      status:
        type: string
        enum: [active, inactive, error]
      config:
        type: object
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time

  DashboardStats:
    type: object
    properties:
      totalDrafts:
        type: integer
      totalProducts:
        type: integer
      totalTeams:
        type: integer
      totalUsers:
        type: integer
      publishedCount:
        type: integer
      scheduledCount:
        type: integer
      reviewCount:
        type: integer

paths:
  # ========== ROOT & HEALTH ==========
  /:
    get:
      tags:
        - health
      summary: API root information
      operationId: rootInfo
      responses:
        200:
          description: API information
          schema:
            type: object

  /health:
    get:
      tags:
        - health
      summary: Health check
      operationId: healthCheck
      responses:
        200:
          description: Server is healthy
          schema:
            type: object
            properties:
              status:
                type: string
              timestamp:
                type: string
              services:
                type: object
              system:
                type: object

  /metrics:
    get:
      tags:
        - health
      summary: System metrics
      operationId: getMetrics
      responses:
        200:
          description: System metrics
          schema:
            type: object
            properties:
              goroutines:
                type: integer
              cpu_cores:
                type: integer
              go_version:
                type: string
              memory:
                type: object

  # ========== AUTH ==========
  /auth/login:
    post:
      tags:
        - auth
      summary: User login
      operationId: login
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/LoginRequest"
      responses:
        200:
          description: Login successful
          schema:
            $ref: "#/definitions/LoginResponse"
        401:
          description: Invalid credentials
          schema:
            $ref: "#/definitions/ErrorResponse"

  /auth/register:
    post:
      tags:
        - auth
      summary: User registration
      operationId: register
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/RegisterRequest"
      responses:
        201:
          description: User registered successfully
          schema:
            $ref: "#/definitions/User"
        400:
          description: Invalid request
          schema:
            $ref: "#/definitions/ErrorResponse"
        409:
          description: User already exists
          schema:
            $ref: "#/definitions/ErrorResponse"

  /auth/me:
    get:
      tags:
        - auth
      summary: Get current user
      operationId: getMe
      security:
        - BearerAuth: []
      responses:
        200:
          description: Current user info
          schema:
            $ref: "#/definitions/User"
        401:
          description: Unauthorized

  /auth/change-password:
    post:
      tags:
        - auth
      summary: Change password
      operationId: changePassword
      security:
        - BearerAuth: []
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/ChangePasswordRequest"
      responses:
        200:
          description: Password changed
          schema:
            $ref: "#/definitions/SuccessResponse"
        401:
          description: Invalid old password

  /auth/forgot-password:
    post:
      tags:
        - auth
      summary: Forgot password
      operationId: forgotPassword
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/ForgotPasswordRequest"
      responses:
        200:
          description: Reset email sent
          schema:
            $ref: "#/definitions/SuccessResponse"

  # ========== DASHBOARD ==========
  /dashboard/stats:
    get:
      tags:
        - dashboard
      summary: Get dashboard statistics
      operationId: getDashboardStats
      security:
        - BearerAuth: []
      responses:
        200:
          description: Dashboard statistics
          schema:
            $ref: "#/definitions/DashboardStats"
        401:
          description: Unauthorized

  # ========== USERS ==========
  /users:
    get:
      tags:
        - users
      summary: Get all users
      operationId: getUsers
      security:
        - BearerAuth: []
      responses:
        200:
          description: List of users
          schema:
            type: array
            items:
              $ref: "#/definitions/User"
        401:
          description: Unauthorized

    post:
      tags:
        - users
      summary: Create user
      operationId: createUser
      security:
        - BearerAuth: []
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/RegisterRequest"
      responses:
        201:
          description: User created
          schema:
            $ref: "#/definitions/User"

  /users/{id}:
    get:
      tags:
        - users
      summary: Get user by ID
      operationId: getUserById
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          type: string
          format: uuid
      responses:
        200:
          description: User details
          schema:
            $ref: "#/definitions/User"
        404:
          description: User not found

    put:
      tags:
        - users
      summary: Update user
      operationId: updateUser
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          type: string
          format: uuid
        - in: body
          name: body
          required: true
          schema:
            type: object
      responses:
        200:
          description: User updated
          schema:
            $ref: "#/definitions/SuccessResponse"

    delete:
      tags:
        - users
      summary: Delete user
      operationId: deleteUser
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          type: string
          format: uuid
      responses:
        204:
          description: User deleted

  # ========== TEAMS ==========
  /teams:
    get:
      tags:
        - teams
      summary: Get all teams
      operationId: getTeams
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: status
          type: string
          enum: [active, inactive, archived]
      responses:
        200:
          description: List of teams
          schema:
            type: array
            items:
              $ref: "#/definitions/Team"
        401:
          description: Unauthorized

    post:
      tags:
        - teams
      summary: Create team
      operationId: createTeam
      security:
        - BearerAuth: []
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreateTeamRequest"
      responses:
        201:
          description: Team created
          schema:
            $ref: "#/definitions/Team"

  /teams/{id}:
    get:
      tags:
        - teams
      summary: Get team by ID
      operationId: getTeamById
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          type: string
          format: uuid
      responses:
        200:
          description: Team details
          schema:
            $ref: "#/definitions/Team"
        404:
          description: Team not found

    put:
      tags:
        - teams
      summary: Update team
      operationId: updateTeam
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          type: string
          format: uuid
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/UpdateTeamRequest"
      responses:
        200:
          description: Team updated
          schema:
